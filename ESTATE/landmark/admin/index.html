<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — LandMark Realty</title>
  <!-- No link to main site nav, completely separate -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --gold:#C9A84C; --gold-light:#E2C97E; --ink:#0E1117; --ink-800:#161B26; --ink-700:#1E2535; --stone:#8A8F9C; --stone-light:#BEC3CE; --cream:#F8F5EF; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--ink); color: var(--cream); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: hidden; }

    .bg-grid { position: fixed; inset: 0; opacity: 0.04; background-image: linear-gradient(var(--gold) 1px, transparent 1px), linear-gradient(90deg, var(--gold) 1px, transparent 1px); background-size: 60px 60px; }
    .glow { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.08; }

    .login-card { background: var(--ink-800); border: 1px solid rgba(201,168,76,0.2); border-radius: 22px; padding: 52px 44px; max-width: 420px; width: 100%; position: relative; z-index: 2; box-shadow: 0 32px 80px rgba(0,0,0,0.5); }
    .brand { font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .brand-sub { color: var(--stone); font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 36px; }
    .lock-icon { width: 64px; height: 64px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; margin-bottom: 24px; color: var(--gold); }

    .form-label { color: var(--stone-light); font-size: 0.8rem; letter-spacing: 0.04em; margin-bottom: 6px; display: block; }
    .form-input { width: 100%; background: var(--ink-700); border: 1px solid rgba(255,255,255,0.1); color: var(--cream); border-radius: 10px; padding: 13px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; transition: border-color 0.2s; outline: none; margin-bottom: 16px; }
    .form-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
    .form-input::placeholder { color: var(--stone); }

    .btn-login { width: 100%; background: var(--gold); color: var(--ink); border: none; border-radius: 100px; padding: 14px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; margin-top: 4px; }
    .btn-login:hover { background: var(--gold-light); transform: translateY(-1px); }

    .error-msg { color: #E05252; font-size: 0.82rem; margin-bottom: 12px; display: none; text-align: center; }
    .back-link { color: var(--stone); font-size: 0.8rem; text-decoration: none; transition: color 0.2s; }
    .back-link:hover { color: var(--gold); }
    .hint { color: var(--stone); font-size: 0.72rem; text-align: center; margin-top: 18px; opacity: 0.7; }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="glow" style="width:500px;height:500px;background:#C9A84C;top:-150px;right:-150px;"></div>
<div class="glow" style="width:350px;height:350px;background:#4A8FB8;bottom:-100px;left:-100px;"></div>

<div class="login-card">
  <div class="lock-icon"><i class="bi bi-shield-lock-fill"></i></div>
  <div class="brand"><i class="bi bi-buildings me-2"></i>LandMark Realty</div>
  <div class="brand-sub">Admin Portal</div>

  <div>
    <label class="form-label">Username</label>
    <input type="text" class="form-input" id="username" placeholder="admin" autocomplete="username"/>

    <label class="form-label">Password</label>
    <input type="password" class="form-input" id="password" placeholder="Enter password"
      autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()"/>

    <div class="error-msg" id="err-msg"><i class="bi bi-exclamation-circle me-1"></i>Incorrect credentials. Please try again.</div>

    <button class="btn-login" onclick="doLogin()">
      <i class="bi bi-box-arrow-in-right me-2"></i>Login to Dashboard
    </button>
  </div>

  <div class="text-center mt-4">
    <a href="../index.html" class="back-link"><i class="bi bi-arrow-left me-1"></i>Back to Website</a>
  </div>
  <div class="hint">Demo credentials: admin / agent2024</div>
</div>

<script src="../assets/js/data.js"></script>
<script>
  // Redirect if already logged in
  if (LM.isLoggedIn()) window.location.href = 'dashboard.html';

  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const err = document.getElementById('err-msg');

    if (LM.login(u, p)) {
      window.location.href = 'dashboard.html';
    } else {
      err.style.display = 'block';
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
      setTimeout(() => err.style.display = 'none', 4000);
    }
  }
</script>
</body>
</html>
