<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Properties — LandMark Realty</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>

<nav class="site-nav" id="site-nav"></nav>

<!-- Page Header -->
<div class="page-header">
  <div class="container">
    <span class="eyebrow">Browse</span>
    <h1 class="display-serif" style="font-size:clamp(2rem,4vw,3.2rem);">All Properties</h1>
    <div class="section-divider"></div>
    <p style="color:var(--stone);max-width:540px;font-size:0.93rem;line-height:1.8;">Explore our full range of verified properties. Filter by type, budget, or location to find your perfect match.</p>
  </div>
</div>

<div class="container py-5">

  <!-- Filters Row -->
  <div class="row g-3 mb-4 align-items-end">
    <div class="col-md-3">
      <label class="form-label">Property Type</label>
      <select class="form-field" id="f-type" onchange="applyFilters()">
        <option value="">All Types</option>
        <option value="house">Houses</option>
        <option value="room">Rooms</option>
        <option value="land">Land</option>
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label">Budget</label>
      <select class="form-field" id="f-budget" onchange="applyFilters()">
        <option value="">Any Budget</option>
        <option value="low">Under GHS 200K</option>
        <option value="mid">GHS 200K – 600K</option>
        <option value="high">Above GHS 600K</option>
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label">Location</label>
      <input class="form-field" type="text" id="f-loc" placeholder="e.g. Accra, Tema…" oninput="applyFilters()"/>
    </div>
    <div class="col-md-3">
      <label class="form-label">Sort By</label>
      <select class="form-field" id="f-sort" onchange="applyFilters()">
        <option value="newest">Newest First</option>
        <option value="featured">Featured First</option>
      </select>
    </div>
  </div>

  <!-- Type Chips -->
  <div class="d-flex gap-2 mb-4 flex-wrap">
    <button class="chip active" id="chip-all"   onclick="setChip('')">All</button>
    <button class="chip"        id="chip-house" onclick="setChip('house')">🏠 Houses</button>
    <button class="chip"        id="chip-room"  onclick="setChip('room')">🛏 Rooms</button>
    <button class="chip"        id="chip-land"  onclick="setChip('land')">🌿 Land</button>
  </div>

  <!-- Results count -->
  <div id="results-count" style="color:var(--stone);font-size:0.83rem;margin-bottom:20px;"></div>

  <!-- Grid -->
  <div class="row g-4" id="listings-grid"></div>

  <!-- No results -->
  <div id="no-results" style="display:none;" class="text-center py-5">
    <div style="font-size:4rem;margin-bottom:16px;opacity:0.5;">🔍</div>
    <p style="color:var(--stone);font-size:1rem;">No properties match your search.<br>
      <a href="request.html" style="color:var(--gold);">Submit a custom property request instead →</a>
    </p>
  </div>

</div>

<footer class="site-footer" id="site-footer"></footer>
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    renderNavbar('properties.html');
    renderFooter();

    // Read URL params (from hero search)
    const p = new URLSearchParams(window.location.search);
    if (p.get('type'))   { document.getElementById('f-type').value   = p.get('type');   setChip(p.get('type'), false); }
    if (p.get('budget')) document.getElementById('f-budget').value = p.get('budget');
    if (p.get('loc'))    document.getElementById('f-loc').value    = p.get('loc');

    applyFilters();
  });

  function setChip(val, triggerFilter = true) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    document.getElementById('chip-' + (val || 'all'))?.classList.add('active');
    document.getElementById('f-type').value = val;
    if (triggerFilter) applyFilters();
  }

  function applyFilters() {
    const type   = document.getElementById('f-type').value;
    const budget = document.getElementById('f-budget').value;
    const loc    = document.getElementById('f-loc').value.toLowerCase().trim();
    const sort   = document.getElementById('f-sort').value;

    // Sync chips
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    document.getElementById('chip-' + (type || 'all'))?.classList.add('active');

    let list = LM.getListings().filter(l => l.status !== 'let');
    if (type)   list = list.filter(l => l.type === type);
    if (loc)    list = list.filter(l => l.location.toLowerCase().includes(loc) || l.title.toLowerCase().includes(loc));
    if (budget === 'low')  list = list.filter(l => LM.priceNum(l.price) < 200000);
    if (budget === 'mid')  list = list.filter(l => { const n = LM.priceNum(l.price); return n >= 200000 && n <= 600000; });
    if (budget === 'high') list = list.filter(l => LM.priceNum(l.price) > 600000);
    if (sort === 'featured') list.sort((a,b) => (b.featured?1:0) - (a.featured?1:0));
    else list.sort((a,b) => (b.created||0) - (a.created||0));

    const grid   = document.getElementById('listings-grid');
    const noRes  = document.getElementById('no-results');
    const count  = document.getElementById('results-count');
    count.textContent = `Showing ${list.length} propert${list.length===1?'y':'ies'}`;

    if (list.length === 0) { grid.innerHTML = ''; noRes.style.display = 'block'; }
    else { noRes.style.display = 'none'; grid.innerHTML = list.map(l => buildPropertyCard(l, 'openModal')).join(''); }
  }
</script>
</body>
</html>
