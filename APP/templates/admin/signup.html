<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230E1117'/><text y='72' x='50' text-anchor='middle' font-size='62' font-family='Georgia,serif' fill='%23C9A84C'>LR</text></svg>"/>
  <meta name="theme-color" content="#0E1117"/>
  <title>Create Admin Account — LandMark</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--gold:#C9A84C;--gold-light:#E2C97E;--ink:#0E1117;--ink-800:#161B26;--ink-700:#1E2535;--stone:#8A8F9C;--stone-light:#BEC3CE;--cream:#F8F5EF;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .bg-grid{position:fixed;inset:0;opacity:0.04;background-image:linear-gradient(var(--gold) 1px,transparent 1px),linear-gradient(90deg,var(--gold) 1px,transparent 1px);background-size:60px 60px;}
    .glow{position:fixed;border-radius:50%;filter:blur(100px);opacity:0.08;pointer-events:none;}
    .card{background:var(--ink-800);border:1px solid rgba(201,168,76,0.2);border-radius:22px;padding:48px 44px;max-width:460px;width:100%;position:relative;z-index:2;box-shadow:0 32px 80px rgba(0,0,0,0.5);}
    .logo{width:64px;height:64px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.25);border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:1.3rem;font-weight:700;margin-bottom:20px;}
    .brand{font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:1.4rem;font-weight:700;margin-bottom:4px;}
    .brand-sub{color:var(--stone);font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:28px;}
    label{color:var(--stone-light);font-size:0.78rem;display:block;margin-bottom:6px;}
    input{width:100%;background:var(--ink-700);border:1px solid rgba(255,255,255,0.1);color:var(--cream);border-radius:10px;padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:0.92rem;outline:none;margin-bottom:16px;transition:border-color 0.2s;}
    input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.12);}
    input::placeholder{color:var(--stone);}
    .btn{width:100%;background:var(--gold);color:var(--ink);border:none;border-radius:100px;padding:14px;font-weight:700;font-size:0.95rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .btn:hover{background:var(--gold-light);}
    .msg{font-size:0.82rem;margin-bottom:12px;padding:10px;border-radius:8px;}
    .msg-err{color:#E05252;background:rgba(224,82,82,0.1);}
    .msg-ok{color:#5A9B5A;background:rgba(90,155,90,0.1);}
    .back{color:var(--stone);font-size:0.78rem;text-decoration:none;display:block;text-align:center;margin-top:16px;}
    .back:hover{color:var(--gold);}
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow" style="width:500px;height:500px;background:#C9A84C;top:-150px;right:-150px;"></div>

<div class="card">
  <div class="logo">LR</div>
  <div class="brand">Create Admin Account</div>
  <div class="brand-sub">LandMark Realty</div>

  {% with messages = get_flashed_messages() %}{% if messages %}{% for msg in messages %}
    {% set parts = msg.split(':',1) %}
    <div class="msg msg-{{ parts[0] }}"><i class="bi bi-{{ 'check-circle' if parts[0]=='success' else 'exclamation-circle' }} me-1"></i>{{ parts[1] if parts|length > 1 else msg }}</div>
  {% endfor %}{% endif %}{% endwith %}

  <form method="post" action="{{ url_for('admin_signup') }}">
    <label>Full Name</label>
    <input type="text" name="full_name" placeholder="e.g. John Mensah" required/>
    <label>Email Address</label>
    <input type="email" name="email" placeholder="john@example.com" required/>
    <label>Password</label>
    <input type="password" name="password" placeholder="Minimum 6 characters" required/>
    <label>Confirm Password</label>
    <input type="password" name="confirm_password" placeholder="Repeat password" required/>
    <button type="submit" class="btn"><i class="bi bi-person-plus me-2"></i>Create Account</button>
  </form>
  <a href="{{ url_for('admin_dashboard') }}" class="back"><i class="bi bi-arrow-left me-1"></i>Back to Dashboard</a>
</div>
</body>
</html>
