{% extends 'admin/base.html' %}
{% block title %}Settings{% endblock %}
{% block page_title %}Agent Settings{% endblock %}

{% block content %}
<h2 class="page-heading">Agent Settings</h2>

<div class="admin-card" style="max-width:580px;">
  <form method="post" action="{{ url_for('admin_settings') }}">
    <h5 style="color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:1.25rem;margin-bottom:20px;">
      Agent Profile <small style="color:var(--stone);font-size:0.75rem;font-family:'DM Sans',sans-serif;">(shown on website)</small>
    </h5>
    <div class="row g-3">
      <div class="col-12">
        <label class="f-label">Full Name</label>
        <input type="text" name="agent_name" class="f-input" value="{{ agent.name }}"/>
      </div>
      <div class="col-md-6">
        <label class="f-label">Phone Number</label>
        <input type="tel" name="agent_phone" class="f-input" value="{{ agent.phone }}"
          placeholder="+233 24 931 5662"/>
      </div>
      <div class="col-md-6">
        <label class="f-label">WhatsApp Number <small style="color:var(--stone);">(digits only, e.g. 233244…)</small></label>
        <input type="text" name="agent_wa" class="f-input" value="{{ agent.wa }}"
          placeholder="0249315662"/>
      </div>
      <div class="col-12">
        <label class="f-label">Email Address</label>
        <input type="email" name="agent_email" class="f-input" value="{{ agent.email }}"/
        placeholder="isaacteye@gmail.com">
      </div>
      <div class="col-12">
        <label class="f-label">Agent Bio <small style="color:var(--stone);">(shown on About page &amp; footer)</small></label>
        <textarea name="agent_bio" class="f-input" rows="4">{{ agent.bio }}</textarea>
      </div>

      <div class="col-12 mt-2">
        <hr style="border-color:rgba(255,255,255,0.07);margin-bottom:20px;"/>
        <h5 style="color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:1.25rem;margin-bottom:16px;">
          Change Admin Password <small style="color:var(--stone);font-size:0.75rem;font-family:'DM Sans',sans-serif;">(leave blank to keep current)</small>
        </h5>
      </div>
      <div class="col-md-6">
        <label class="f-label">New Password</label>
        <input type="password" name="new_password" class="f-input" placeholder="Enter new password"/>
      </div>
      <div class="col-12">
        <button type="submit" class="btn-g" style="padding:12px 36px;">
          <i class="bi bi-check2 me-1"></i>Save Settings
        </button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
