<section class="py-5" style="background:var(--ink-800);">
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="text-center mb-4">
          <span class="eyebrow">Share Your Experience</span>
          <h2 class="display-serif" style="font-size:clamp(1.6rem,3vw,2.4rem);">Leave a Review</h2>
          <div class="section-divider center"></div>
          <p style="color:var(--stone);font-size:0.88rem;">Your feedback helps other clients make informed decisions.</p>
        </div>
        <div style="background:var(--ink-700);border:1px solid rgba(201,168,76,0.12);border-radius:20px;padding:36px;">
          <form method="post" action="{{ url_for('submit_review') }}">
            <div class="mb-4">
              <label style="color:var(--stone-light);font-size:0.78rem;display:block;margin-bottom:10px;">Your Rating *</label>
              <div class="star-rating">
                {% for i in range(5, 0, -1) %}
                <input type="radio" name="rating" id="star{{ i }}" value="{{ i }}" {{ 'checked' if i == 5 else '' }}/>
                <label for="star{{ i }}" title="{{ i }} star{{ 's' if i > 1 else '' }}">★</label>
                {% endfor %}
              </div>
            </div>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Your Name *</label>
                <input type="text" name="name" class="form-field" placeholder="e.g. Kwame Mensah" required/>
              </div>
              <div class="col-md-6">
                <label class="form-label">Your Role / Location</label>
                <input type="text" name="location" class="form-field" placeholder="e.g. Homebuyer, Accra"/>
              </div>
              <div class="col-12">
                <label class="form-label">Your Review *</label>
                <textarea name="body" class="form-field" rows="4" placeholder="Tell us about your experience working with us…" required></textarea>
              </div>
              <div class="col-12">
                <button type="submit" class="btn-gold w-100 py-3">
                  <i class="bi bi-star me-2"></i>Submit Review
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
