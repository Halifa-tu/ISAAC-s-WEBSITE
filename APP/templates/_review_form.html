<section class="py-5" style="background:var(--ink-800);" id="review-section">
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-7 text-center">

        <!-- Toggle button (always visible) -->
        <span class="eyebrow">Share Your Experience</span>
        <h2 class="display-serif mb-3" style="font-size:clamp(1.6rem,3vw,2.4rem);">Leave a Review</h2>
        <div class="section-divider center"></div>
        <p style="color:var(--stone);font-size:0.88rem;margin-bottom:24px;">Had a great experience with us? We'd love to hear from you.</p>

        <button id="review-toggle-btn" onclick="toggleReviewForm()" class="btn-gold" style="padding:13px 36px;font-size:0.95rem;margin-bottom:32px;">
          <i class="bi bi-star me-2" id="review-btn-icon"></i>
          <span id="review-btn-text">Leave a Review</span>
        </button>

        <!-- The form — hidden until button is clicked -->
        <div class="review-form-wrapper" id="review-form-wrapper">
          <div style="background:var(--ink-700);border:1px solid rgba(201,168,76,0.12);border-radius:20px;padding:36px;text-align:left;">
            <form method="post" action="{{ url_for('submit_review') }}">
              <div class="mb-4">
                <label style="color:var(--stone-light);font-size:0.78rem;display:block;margin-bottom:10px;">Your Rating *</label>
                <div class="star-rating">
                  {% for i in range(5, 0, -1) %}
                  <input type="radio" name="rating" id="star{{ i }}" value="{{ i }}" {{ 'checked' if i == 5 else '' }}/>
                  <label for="star{{ i }}" title="{{ i }} star{{ 's' if i > 1 else '' }}">★</label>
                  {% endfor %}
                </div>
              </div>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Your Name *</label>
                  <input type="text" name="name" class="form-field" placeholder="e.g. Kwame Mensah" required/>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Your Role / Location</label>
                  <input type="text" name="location" class="form-field" placeholder="e.g. Homebuyer, Accra"/>
                </div>
                <div class="col-12">
                  <label class="form-label">Your Review *</label>
                  <textarea name="body" class="form-field" rows="4" placeholder="Tell us about your experience working with us…" required></textarea>
                </div>
                <div class="col-12 d-flex gap-3 flex-wrap">
                  <button type="submit" class="btn-gold flex-grow-1 py-3">
                    <i class="bi bi-send me-2"></i>Submit Review
                  </button>
                  <button type="button" onclick="toggleReviewForm()" class="btn-outline-gold py-3" style="padding-left:20px;padding-right:20px;">
                    Cancel
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>

<script>
  function toggleReviewForm() {
    const wrapper = document.getElementById('review-form-wrapper');
    const btn     = document.getElementById('review-toggle-btn');
    const icon    = document.getElementById('review-btn-icon');
    const text    = document.getElementById('review-btn-text');
    const open    = wrapper.classList.contains('open');

    wrapper.classList.toggle('open', !open);
    icon.className = open ? 'bi bi-star me-2' : 'bi bi-x-circle me-2';
    text.textContent = open ? 'Leave a Review' : 'Cancel';

    if (!open) {
      // Smooth scroll to form
      setTimeout(() => {
        wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }
  }
</script>
