<section class="py-5 bg-dark-800" id="review-section">
  <div class="container py-3">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6 text-center">

        <span class="eyebrow">Share Your Experience</span>
        <h2 class="display-serif mb-3" style="font-size:clamp(1.5rem,3vw,2.2rem);">Leave a Review</h2>
        <div class="section-divider center mb-3"></div>
        <p class="text-stone mb-4" style="font-size:0.9rem;">Had a great experience? We'd love to hear from you.</p>

        <button type="button" id="review-toggle-btn"
          onclick="document.getElementById('review-form-box').style.display='block';
                   document.getElementById('review-toggle-btn').style.display='none';
                   document.getElementById('review-form-box').scrollIntoView({behavior:'smooth',block:'nearest'});"
          class="btn-gold px-5 py-3">
          <i class="bi bi-star-fill me-2"></i>Leave a Review
        </button>

        <div id="review-form-box" style="display:none; margin-top:24px; text-align:left;">
          <div class="rounded-4 p-4" style="background:#1E2535; border:1px solid rgba(201,168,76,0.2);">
            <form method="post" action="{{ url_for('submit_review') }}">
              <p class="text-stone mb-1" style="font-size:0.78rem; text-transform:uppercase; letter-spacing:.06em;">Your Rating *</p>
              <div class="d-flex gap-1 mb-4">
                {% for i in [5,4,3,2,1] %}
                <input type="radio" name="rating" id="r{{ i }}" value="{{ i }}" class="d-none" {{ 'checked' if i==5 else '' }}/>
                <label for="r{{ i }}" class="star-lbl" style="font-size:2rem; cursor:pointer; color:#8A8F9C; transition:color .15s;"
                  onmouseover="highlightStars({{ i }})" onmouseout="resetStars()"
                  onclick="selectStar({{ i }})">★</label>
                {% endfor %}
              </div>
              <div class="row g-3">
                <div class="col-12 col-sm-6">
                  <label class="form-label">Your Name *</label>
                  <input type="text" name="name" class="form-field" placeholder="e.g. Kwame Mensah" required/>
                </div>
                <div class="col-12 col-sm-6">
                  <label class="form-label">Location / Role</label>
                  <input type="text" name="location" class="form-field" placeholder="e.g. Homebuyer, Accra"/>
                </div>
                <div class="col-12">
                  <label class="form-label">Your Review *</label>
                  <textarea name="body" class="form-field" rows="4" placeholder="Tell us about your experience…" required></textarea>
                </div>
                <div class="col-12">
                  <div class="d-grid gap-2 d-sm-flex">
                    <button type="submit" class="btn-gold flex-grow-1 py-3">
                      <i class="bi bi-send me-2"></i>Submit Review
                    </button>
                    <button type="button" class="btn-outline-gold py-3 px-4"
                      onclick="document.getElementById('review-form-box').style.display='none';
                               document.getElementById('review-toggle-btn').style.display='inline-flex';">
                      Cancel
                    </button>
                  </div>
                </div>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>

<script>
var selectedRating = 5;
function highlightStars(n) {
  var lbls = document.querySelectorAll('.star-lbl');
  lbls.forEach(function(l, i) { l.style.color = (5-i) <= n ? '#C9A84C' : '#8A8F9C'; });
}
function resetStars() { highlightStars(selectedRating); }
function selectStar(n) {
  selectedRating = n;
  document.getElementById('r'+n).checked = true;
  resetStars();
}
// Init stars to show 5 selected
resetStars();
</script>
