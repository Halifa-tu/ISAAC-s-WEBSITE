<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login — Hali-Tech</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fraunces:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#f7faf8;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .card{background:#fff;border:1px solid #dde9e2;border-radius:16px;padding:2.75rem;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06);}
    .logo{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:400;color:#0f1a14;text-align:center;margin-bottom:.25rem;}
    .logo b{color:#1a7a4a;}
    .sub{text-align:center;font-size:.78rem;color:#7a8e82;margin-bottom:2rem;}
    label{font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#7a8e82;display:block;margin-bottom:.35rem;}
    input{width:100%;background:#f7faf8;border:1px solid #dde9e2;border-radius:8px;padding:.75rem 1rem;font-family:'Plus Jakarta Sans',sans-serif;font-size:.875rem;color:#0f1a14;outline:none;transition:all .2s;margin-bottom:1.1rem;}
    input:focus{border-color:#1a7a4a;box-shadow:0 0 0 3px rgba(26,122,74,.08);}
    button{width:100%;background:#1a7a4a;color:#fff;border:none;border-radius:8px;padding:.85rem;font-size:.8rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
    button:hover{background:#15693e;}
    .error{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;font-size:.8rem;border-radius:8px;padding:.7rem 1rem;margin-bottom:1.1rem;}
    .back{text-align:center;margin-top:1.25rem;font-size:.78rem;color:#7a8e82;}
    .back a{color:#1a7a4a;text-decoration:none;font-weight:600;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Hali<b>-Tech</b></div>
    <div class="sub">Admin Portal — Sign in to continue</div>
    {% if error %}<div class="error"><i class="fas fa-exclamation-circle me-1"></i>{{ error }}</div>{% endif %}
    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" placeholder="admin" required autofocus>
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
      <button type="submit"><i class="fas fa-sign-in-alt me-2"></i>Sign In</button>
    </form>
    <div class="back"><a href="/">← Back to website</a></div>
  </div>
</body>
</html>
